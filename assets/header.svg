<svg viewBox="0 0 1200 280" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <style>
      @keyframes orbPulse1 {
        0%, 100% { r: 210px; opacity: 0.55; }
        50%       { r: 255px; opacity: 0.9;  }
      }
      @keyframes orbPulse2 {
        0%, 100% { r: 190px; opacity: 0.4; }
        50%       { r: 230px; opacity: 0.75; }
      }
      @keyframes slideFadeIn {
        from { opacity: 0; transform: translateY(18px); }
        to   { opacity: 1; transform: translateY(0);    }
      }
      @keyframes badgePulse {
        0%, 100% { opacity: 0.75; }
        50%       { opacity: 1;    }
      }
      @keyframes barSlide {
        from { width: 0px; }
        to   { width: 240px; }
      }
      .t-name     { animation: slideFadeIn 0.9s ease 0.1s both; }
      .t-sub      { animation: slideFadeIn 0.9s ease 0.4s both; }
      .t-badges   { animation: slideFadeIn 0.9s ease 0.7s both; }
      .badge-d    { animation: badgePulse 4s ease-in-out 0s   infinite; }
      .badge-h    { animation: badgePulse 4s ease-in-out 1.3s infinite; }
      .badge-p    { animation: badgePulse 4s ease-in-out 2.6s infinite; }
    </style>

    <!-- Background gradient -->
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1" gradientUnits="objectBoundingBox">
      <stop offset="0%"   stop-color="#0d0a1f"/>
      <stop offset="50%"  stop-color="#110e2a"/>
      <stop offset="100%" stop-color="#0d1117"/>
    </linearGradient>

    <!-- Name gradient -->
    <linearGradient id="nameGrad" x1="0" y1="0" x2="1" y2="0" gradientUnits="objectBoundingBox">
      <stop offset="0%"   stop-color="#a855f7"/>
      <stop offset="50%"  stop-color="#818cf8"/>
      <stop offset="100%" stop-color="#06b6d4"/>
    </linearGradient>

    <!-- Bottom bar gradient -->
    <linearGradient id="barGrad" x1="0" y1="0" x2="1" y2="0" gradientUnits="objectBoundingBox">
      <stop offset="0%"   stop-color="#0d1117"  stop-opacity="0"/>
      <stop offset="25%"  stop-color="#a855f7"  stop-opacity="0.9"/>
      <stop offset="75%"  stop-color="#06b6d4"  stop-opacity="0.9"/>
      <stop offset="100%" stop-color="#0d1117"  stop-opacity="0"/>
    </linearGradient>

    <!-- Glow filter -->
    <filter id="glow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="7" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>

    <!-- Soft glow for orbs -->
    <filter id="orbGlow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="40"/>
    </filter>

    <!-- Dot grid pattern -->
    <pattern id="dots" x="0" y="0" width="32" height="32" patternUnits="userSpaceOnUse">
      <circle cx="1" cy="1" r="1.1" fill="rgba(168,85,247,0.13)"/>
    </pattern>
  </defs>

  <!-- Base background -->
  <rect width="1200" height="280" fill="url(#bg)"/>

  <!-- Dot grid -->
  <rect width="1200" height="280" fill="url(#dots)" opacity="0.9"/>

  <!-- Orbs -->
  <circle cx="155" cy="140" r="210" fill="#a855f7" filter="url(#orbGlow)" opacity="0.55">
    <animate attributeName="r"       values="210;255;210" dur="8s"  repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0.55;0.9;0.55" dur="8s" repeatCount="indefinite"/>
  </circle>
  <circle cx="1050" cy="140" r="190" fill="#06b6d4" filter="url(#orbGlow)" opacity="0.4">
    <animate attributeName="r"       values="190;230;190" dur="10s"  repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0.4;0.75;0.4" dur="10s" repeatCount="indefinite"/>
  </circle>

  <!-- Edge vignette so orbs don't bleed -->
  <defs>
    <radialGradient id="vignette" cx="50%" cy="50%" r="70%" gradientUnits="objectBoundingBox">
      <stop offset="0%"   stop-color="#0d1117" stop-opacity="0"/>
      <stop offset="100%" stop-color="#0d1117" stop-opacity="0.75"/>
    </radialGradient>
  </defs>
  <rect width="1200" height="280" fill="url(#vignette)"/>

  <!-- ── NAME ─────────────────────────────────────────── -->
  <text class="t-name"
        x="600" y="118"
        font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',Helvetica,Arial,sans-serif"
        font-size="78" font-weight="900" letter-spacing="10"
        text-anchor="middle" dominant-baseline="middle"
        fill="url(#nameGrad)" filter="url(#glow)">
    AMAN SINGH
  </text>

  <!-- ── SUBTITLE ──────────────────────────────────────── -->
  <text class="t-sub"
        x="600" y="160"
        font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',Helvetica,Arial,sans-serif"
        font-size="14" font-weight="400" letter-spacing="5"
        text-anchor="middle" dominant-baseline="middle"
        fill="rgba(196,181,253,0.65)">
    AI/ML ENGINEER  ·  RESEARCHER  ·  BANGALORE, INDIA
  </text>

  <!-- Thin divider -->
  <line x1="460" y1="177" x2="740" y2="177"
        stroke="rgba(168,85,247,0.25)" stroke-width="1"/>

  <!-- ── RESEARCH BADGES ────────────────────────────────── -->
  <g class="t-badges">
    <!-- DARWIN -->
    <g class="badge-d">
      <rect x="376" y="193" width="130" height="34" rx="17"
            fill="rgba(168,85,247,0.08)" stroke="rgba(168,85,247,0.45)" stroke-width="1"/>
      <text x="441" y="214"
            font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',Helvetica,Arial,sans-serif"
            font-size="12.5" font-weight="700" letter-spacing="1.5"
            text-anchor="middle" dominant-baseline="middle"
            fill="#a855f7">🧬 DARWIN</text>
    </g>

    <!-- HELIOS -->
    <g class="badge-h">
      <rect x="535" y="193" width="130" height="34" rx="17"
            fill="rgba(129,140,248,0.08)" stroke="rgba(129,140,248,0.45)" stroke-width="1"/>
      <text x="600" y="214"
            font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',Helvetica,Arial,sans-serif"
            font-size="12.5" font-weight="700" letter-spacing="1.5"
            text-anchor="middle" dominant-baseline="middle"
            fill="#818cf8">🌌 HELIOS</text>
    </g>

    <!-- PHANTOM -->
    <g class="badge-p">
      <rect x="694" y="193" width="130" height="34" rx="17"
            fill="rgba(6,182,212,0.08)" stroke="rgba(6,182,212,0.45)" stroke-width="1"/>
      <text x="759" y="214"
            font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',Helvetica,Arial,sans-serif"
            font-size="12.5" font-weight="700" letter-spacing="1.5"
            text-anchor="middle" dominant-baseline="middle"
            fill="#06b6d4">👻 PHANTOM</text>
    </g>
  </g>

  <!-- Bottom accent bar -->
  <rect x="0" y="276" width="1200" height="3" fill="url(#barGrad)"/>
</svg>
